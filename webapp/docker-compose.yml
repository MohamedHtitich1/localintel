services:
  db:
    image: postgis/postgis:16-3.4
    container_name: localintel-db
    environment:
      POSTGRES_DB: localintel
      POSTGRES_USER: localintel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localintel_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localintel"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localintel-api
    environment:
      DATABASE_URL: postgresql+asyncpg://localintel:${DB_PASSWORD:-localintel_dev}@db:5432/localintel
      DATABASE_URL_SYNC: postgresql://localintel:${DB_PASSWORD:-localintel_dev}@db:5432/localintel
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./data:/app/data
      - ./scripts:/app/scripts
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # Scheduled pipeline runner — executes metrics refresh on a cron schedule
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localintel-scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://localintel:${DB_PASSWORD:-localintel_dev}@db:5432/localintel
      DATABASE_URL_SYNC: postgresql://localintel:${DB_PASSWORD:-localintel_dev}@db:5432/localintel
      # Cron schedule: default = every Sunday at 3:00 AM
      PIPELINE_CRON: "${PIPELINE_CRON:-0 3 * * 0}"
      PIPELINE_ARGS: "${PIPELINE_ARGS:---metrics}"
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - ./data:/app/data
      - ./frontend:/app/frontend
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c '
        echo "LocalIntel Scheduler — cron: $${PIPELINE_CRON}"
        echo "PYTHONPATH=/app" > /etc/cron.d/localintel
        echo "$${PIPELINE_CRON} root cd /app && /usr/local/bin/python scripts/pipeline.py $${PIPELINE_ARGS} --log /app/data/pipeline.log 2>&1" >> /etc/cron.d/localintel
        echo "" >> /etc/cron.d/localintel
        chmod 0644 /etc/cron.d/localintel
        crontab /etc/cron.d/localintel
        echo "Crontab installed:"
        crontab -l
        echo "Scheduler running. Waiting for next trigger..."
        cron -f
      '
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: localintel-nginx
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
      - ./data:/app/data
    depends_on:
      - api

  # Tunnel disabled — cloudflared runs on host via systemd
  # (installed with: sudo cloudflared service install <token>)
  # Configure public hostname in Cloudflare Zero Trust dashboard:
  #   Service: http://localhost:8090
  #
  # To use Docker tunnel instead, uncomment below:
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   container_name: localintel-tunnel
  #   command: tunnel run
  #   environment:
  #     TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
  #   depends_on:
  #     - nginx
  #   restart: unless-stopped

volumes:
  pgdata:
