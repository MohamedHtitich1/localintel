server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # Exact match for root — serve the platform page directly
    location = / {
        try_files /localintel-platform.html =404;
    }

    # All other frontend paths — static assets, SPA fallback
    location / {
        try_files $uri /localintel-platform.html;
    }

    # Static data files (GeoJSON)
    location /data/ {
        alias /app/data/;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=86400";
    }

    # API proxy — all routes including admin POST endpoints
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for pipeline operations (ingest, metrics refresh)
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # CORS headers
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # Gzip
    gzip on;
    gzip_types application/json application/javascript text/css text/html text/csv;
    gzip_min_length 1000;

    # Increase body size for potential future data uploads
    client_max_body_size 50m;
}
