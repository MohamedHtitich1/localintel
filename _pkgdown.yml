url: https://mohamedhtitich1.github.io/localintel/

development:
  mode: auto

template:
  package: pkgdown
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#7c9885"
    secondary: "#9ab8a3"
    success: "#9ab8a3"
    info: "#7cb08a"
    bg: "#141719"
    fg: "#d4d8d5"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem
    font-size-base: 1rem
    base_font:
      google: "IBM Plex Sans"
    heading_font:
      google: "EB Garamond"
    code_font:
      google: "JetBrains Mono"
  opengraph:
    image:
      src: man/figures/og-image.png
      alt: "localintel – Inequality Mapping Engine for Subnational Data Analysis"
    twitter:
      creator: "@MohamedHtitich"
      card: summary_large_image
  includes:
    in_header: |
      <meta property="og:image:width" content="1200" />
      <meta property="og:image:height" content="630" />
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

home:
  title: "localintel – Inequality Mapping Engine for Subnational Data"
  description: >
    An R package and inequality mapping engine for fetching, harmonizing,
    cascading, and visualizing subnational indicators from Eurostat (Europe)
    and DHS (Sub-Saharan Africa). Covers 200+ indicators across 22 thematic
    domains for 700+ subnational regions.
  links:
    - text: "Live Demo — Where Inequality Lives"
      href: https://mhtitich.com/subnational
    - text: Request a custom deployment
      href: mailto:m.ahtitich@outlook.com

authors:
  Mohamed Htitich:
    href: https://mhtitich.com

navbar:
  bg: "#0a0c0e"
  type: dark
  structure:
    left:  [intro, reference, articles, news]
    right: [search, demo, github, website]
  components:
    demo:
      icon: fa-play-circle
      href: https://mhtitich.com/subnational
      aria-label: "Where Inequality Lives — Live Demo"
      text: " Demo"
    github:
      icon: fa-github
      href: https://github.com/MohamedHtitich1/localintel
      aria-label: GitHub
    website:
      icon: fa-globe
      href: https://mhtitich.com
      aria-label: "Author Website"

reference:
  - title: "Package Overview"
    contents:
      - localintel-package

  # ===== EUROSTAT =====

  - title: "Eurostat — Indicator Registry"
    desc: >
      Curated registries of Eurostat dataset codes across 14 thematic
      domains — 150+ indicators ready for seamless fetching and processing.
    contents:
      - all_regional_codes
      - indicator_count
      - economy_codes
      - demography_codes
      - education_codes
      - labour_codes
      - health_system_codes
      - causes_of_death_codes
      - tourism_codes
      - transport_codes
      - environment_codes
      - science_codes
      - poverty_codes
      - agriculture_codes
      - business_codes
      - information_society_codes
      - crime_codes

  - title: "Eurostat — Data Fetching"
    desc: >
      Robust wrappers for the Eurostat API — fetch single or batch
      datasets at any NUTS level with automatic retry and caching.
    contents:
      - get_nuts2
      - get_nuts_level
      - get_nuts_level_robust
      - get_nuts_level_safe
      - fetch_eurostat_batch
      - drop_empty
      - clear_localintel_cache

  - title: "Eurostat — Reference Data"
    desc: >
      NUTS boundary geometries, hierarchical lookup tables, and
      population data for spatial joins and cascading.
    contents:
      - get_nuts_geo
      - get_nuts_geopolys
      - get_nuts2_ref
      - get_nuts2_names
      - get_population_nuts2
      - eu27_codes

  - title: "Eurostat — Data Processing"
    desc: >
      Transform raw Eurostat downloads into analysis-ready tables.
      Use the generic processor for any dataset, or domain-specific
      convenience functions for common indicators.
    contents:
      - process_eurostat
      - process_gdp
      - process_employment
      - process_unemployment_rate
      - process_population
      - process_life_expectancy
      - process_tourism_nights
      - process_rd_expenditure
      - process_education_attainment
      - process_poverty_rate
      - process_waste
      - process_beds
      - process_physicians
      - process_disch_inp
      - process_disch_day
      - process_hos_days
      - process_los
      - process_cod
      - process_health_perceptions
      - merge_datasets
      - transform_and_score
      - compute_composite

  - title: "Eurostat — Data Cascading"
    desc: >
      Fill missing regional data by propagating from parent NUTS
      levels (NUTS 0 → NUTS 1 → NUTS 2) with source-level tracking.
    contents:
      - cascade_to_nuts2
      - cascade_to_nuts2_and_compute
      - cascade_to_nuts2_light
      - balance_panel

  - title: "Eurostat — Econometric Imputation"
    desc: >
      Advanced time series imputation combining PCHIP interpolation
      for internal gaps with autoregressive ETS forecasting for
      future periods — with flag-based provenance tracking.
    contents:
      - interp_pchip_flag
      - forecast_autoregressive
      - impute_series

  - title: "Eurostat — Visualization & Mapping"
    desc: >
      Build spatial objects and render publication-ready tmap
      facets — automatic best-level selection per country-year.
    contents:
      - build_display_sf
      - lc_build_display_sf
      - plot_best_by_country_level
      - build_multi_var_sf
      - level_col_for
      - level_cols_for

  - title: "Eurostat — Export & Labels"
    desc: >
      Export enriched GeoJSON for Tableau, multi-sheet Excel workbooks,
      RDS snapshots, and multi-page PDF map books. Includes label
      registries for all 14 domains.
    contents:
      - export_to_geojson
      - enrich_for_tableau
      - export_to_excel
      - export_to_rds
      - save_maps_to_pdf
      - regional_var_labels
      - regional_domain_mapping
      - health_var_labels
      - health_pillar_mapping
      - cod_labels

  # ===== DHS =====

  - title: "DHS — Indicator Registry"
    desc: >
      Curated registries of DHS indicator codes across 8 thematic
      domains covering mortality, nutrition, health, WASH, education,
      HIV, gender, and wealth for Sub-Saharan Africa.
    contents:
      - all_dhs_codes
      - dhs_indicator_count
      - dhs_mortality_codes
      - dhs_nutrition_codes
      - dhs_health_codes
      - dhs_wash_codes
      - dhs_education_codes
      - dhs_hiv_codes
      - dhs_gender_codes
      - dhs_wealth_codes
      - dhs_var_labels
      - dhs_domain_mapping

  - title: "DHS — Data Fetching"
    desc: >
      Fetch DHS indicator data from the DHS Program API with
      country filtering, survey discovery, and batch downloads.
    contents:
      - get_dhs_data
      - get_dhs_countries
      - get_dhs_surveys
      - fetch_dhs_batch

  - title: "DHS — Reference Data & Geography"
    desc: >
      SSA country codes, Admin-1 reference skeletons, and GADM
      boundary geometries for spatial analysis and mapping.
    contents:
      - ssa_codes
      - tier1_codes
      - keep_ssa
      - get_admin1_ref
      - get_admin0_geo
      - get_admin1_geo
      - add_dhs_country_name

  - title: "DHS — Data Processing"
    desc: >
      Process raw DHS API responses into standardized long-format
      tables with region codes, harmonized names, and indicator columns.
    contents:
      - process_dhs
      - process_dhs_batch

  - title: "DHS — Gap-Filling"
    desc: >
      GAM-based temporal interpolation and forecasting for irregularly
      spaced DHS survey data. Produces smooth continuous time series
      with uncertainty bounds and provenance flags.
    contents:
      - gapfill_series
      - gapfill_indicator
      - gapfill_all_dhs

  - title: "DHS — Panel Assembly & Cascading"
    desc: >
      Assemble gap-filled indicators into a balanced Admin-1 panel
      with national-level fallback, imputation flags, and source tracking.
    contents:
      - cascade_to_admin1
      - balance_dhs_panel
      - dhs_pipeline

  - title: "DHS — Visualization & Export"
    desc: >
      Build spatial objects for DHS Admin-1 data and render choropleth
      maps. Export Tableau-ready GeoJSON with country names and labels.
    contents:
      - build_dhs_display_sf
      - build_dhs_multi_var_sf
      - plot_dhs_map
      - enrich_dhs_for_tableau

  # ===== SHARED =====

  - title: "Utilities"
    desc: >
      Helper functions for safe transformations, min-max scaling,
      interpolation, filtering, and country-name enrichment.
    contents:
      - keep_eu27
      - safe_log10
      - safe_log2
      - scale_0_100
      - rescale_minmax
      - interp_const_ends_flag
      - normalize_eurostat_cols
      - standardize_time
      - nuts_country_names
      - add_country_name

